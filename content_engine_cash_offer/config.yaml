engine:
  cycle_delay_seconds: 10
  empty_queue_sleep: 300
  max_rewrites: 2
  min_quality_score: 7.0
  reject_score: 5.0
  articles_per_run: 2
ollama:
  model: llama3.1:8b
  temperature: 0.7
  timeout: 300
  url: http://localhost:11434
output:
