name: Morning healthcheck

# External freshness monitor for joshuafink.com automation pipelines.
# Runs from GitHub Actions (NOT inside the production host) so a Vercel
# or Railway outage can't suppress the alarm. Pages Chuck via Gmail SMTP
# when any pipeline is stale or a check errors.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   DATABASE_URL          Railway Postgres DSN. Reuse the public-networking
#                         connection string that Vercel already uses (or
#                         provision a read-only role and use that — see
#                         docs/automation.md for the hardening follow-up).
#   GMAIL_USER            Gmail address that sends the alert email.
#   GMAIL_APP_PASSWORD    16-char App Password from
#                         https://myaccount.google.com/apppasswords
#                         (NOT your real Gmail password — App Passwords
#                         require 2FA on the Google account).
#   ALERT_TO_EMAIL        Inbox to receive the alert (typically Chuck).
#
# Optional repository variables (Settings → Secrets and variables → Actions
# → Variables tab):
#
#   HEALTHCHECK_URL       Override the default https://joshuafink.com/api/healthcheck.
#
# Manual verification after secrets are set:
#   Actions tab → "Morning healthcheck" → "Run workflow" → branch=main.
#   First run prints a full report to the workflow logs regardless of pass/fail.

on:
  schedule:
    # 7am CDT / 8am CST, weekdays only. DST drift is acceptable (v1).
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      always_email:
        description: 'Send the report even when all checks pass (use for first-run verification).'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

# Don't pile up — one run at a time. If yesterday's run is somehow still
# going, cancel it; freshness reports are only useful when current.
concurrency:
  group: morning-healthcheck
  cancel-in-progress: true

# actions/checkout + setup-* ship as Node 20 JS actions; GitHub forces the
# Node 24 runtime on 2026-06-16. This env var keeps them running across
# the cutover without per-action version chases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history isn't needed, but we need at least one commit on
          # lib/listings.ts to read its timestamp.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-healthcheck.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-healthcheck.txt

      - name: Run unit tests
        run: python -m pytest scripts/test_morning_healthcheck.py -v

      - name: Run morning healthcheck
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          if [ "${{ github.event.inputs.always_email }}" = "true" ]; then
            python scripts/morning_healthcheck.py --always-email --repo-dir "$GITHUB_WORKSPACE"
          else
            python scripts/morning_healthcheck.py --repo-dir "$GITHUB_WORKSPACE"
          fi
