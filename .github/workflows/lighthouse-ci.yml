name: Lighthouse CI

# Runs Lighthouse against a local production build on every PR touching
# frontend code. Fails the PR if Core Web Vitals regress below thresholds
# in lighthouserc.json:
#   - LCP < 2.5s
#   - CLS < 0.1
#   - Total Blocking Time < 200ms (INP proxy — INP can't be measured in lab)
#   - Performance / Accessibility / SEO / Best Practices scores > 0.9
#
# Scope limited to PR-touching paths so content-only commits (blog text)
# don't burn Actions minutes.

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # for the PR comment with scores

# actions/checkout + setup-* ship as Node 20 JS actions; GitHub forces the
# Node 24 runtime on 2026-06-16. This env var keeps them running across
# the cutover without per-action version chases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Disable analytics etc. during CI build
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Start the server, wait up to 60s for it to respond
          runs: 1

      - name: Comment PR with Lighthouse results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.lhci.outputs.manifest || '' }}`
            const links = `${{ steps.lhci.outputs.links || '' }}`
            if (!summary && !links) return
            const body = [
              '## 🔦 Lighthouse CI',
              '',
              links ? `**Reports:** ${links}` : '',
              '',
              summary ? '```\n' + summary.slice(0, 1500) + '\n```' : '',
            ].join('\n')
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
