name: GEO Audit

# Free replacement for the Vercel `geo-audit` cron. Vercel's Hobby plan caps
# cron jobs at 2 and can't run this ~5-minute 3-engine job, so the Vercel cron
# never actually ran. GitHub Actions has no cron-count or duration limit and is
# free — same pattern as sync-listings / social-autopost.
#
# One-time setup: add these repo Secrets (Settings → Secrets and variables →
# Actions). CRON_SECRET + DATABASE_URL + PUSHOVER_* already exist; add the
# answer-engine keys (engines run only when their key is present):
#   PERPLEXITY_API_KEY   OPENAI_API_KEY   ANTHROPIC_API_KEY

on:
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC = 08:00 America/Chicago (CDT) daily
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: geo-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run GEO audit
        run: npx tsx scripts/run-geo-audit.mts
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
