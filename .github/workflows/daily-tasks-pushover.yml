name: Daily tasks Pushover

# Sends Josh his 5-10 minute daily growth tasks via Pushover every morning.
# Runs from GitHub Actions because the Vercel Hobby cron slots are maxed.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   PUSHOVER_TOKEN   Pushover application API token (same value as in Vercel)
#   PUSHOVER_USER    Pushover user key (same value as in Vercel)
#
# The step no-ops (exits 0) if either secret is missing, so a partial setup
# never fails the workflow. Verify manually: Actions tab -> "Daily tasks
# Pushover" -> "Run workflow".

on:
  schedule:
    # 7am CDT / 8am CST, every day. DST drift is acceptable.
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-tasks-pushover
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send daily tasks to Pushover
        shell: bash
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          if [ -z "$PUSHOVER_TOKEN" ] || [ -z "$PUSHOVER_USER" ]; then
            echo "PUSHOVER_TOKEN or PUSHOVER_USER not set — skipping (no failure)."
            exit 0
          fi

          # Items 1 & 2 are the standing reminders (follow up, ask for a review).
          # Items 3-5 rotate through a real backlog so the list never repeats the
          # same generic lines two mornings running. Day-of-year drives the
          # rotation; each slot pulls from a different themed bank, so every
          # morning is a balanced, specific set of tasks Josh can actually finish.
          # 10# forces base-10 so days like 08/09 don't parse as bad octal.
          DOY=$(( 10#$(date -u +%j) ))

          # Slot 3 — Local SEO / Google Business Profile (the map-pack lever)
          GBP=(
            "Add 3 fresh geo-tagged photos to your Google Business Profile"
            "Post a Just Listed / Just Sold to GBP with 2-3 photos"
            "Reply to your 3 most recent Google reviews with a personal thank-you"
            "Answer 1 question in your GBP Q&A (seed one if it's empty)"
            "Post this week's Brentwood market stat to GBP as an update"
            "Confirm your name/address/phone match on Zillow, Realtor.com & Homes.com"
            "Refresh 3 photos on your Zillow agent profile"
          )
          # Slot 4 — Content / visibility
          CONTENT=(
            "Record a 30-sec Brentwood market-update video for a Reel/Short"
            "Screenshot a 5-star review and post it as a graphic to FB + IG"
            "Share a neighborhood guide link to a local Facebook group (add context)"
            "Post a recent client win or testimonial to LinkedIn"
            "Shoot 5 listing/neighborhood photos for your content bank"
            "Post 3 lines on why buyers love a specific Brentwood neighborhood"
          )
          # Slot 5 — Outreach / referrals / pipeline
          OUTREACH=(
            "Text 3 past clients a genuine check-in — no ask"
            "Re-contact 3 leads that went cold over 30 days ago"
            "Ask 1 past client for a referral to someone thinking of moving"
            "Trade referrals with 1 local lender, inspector, or stager"
            "Add real value (not spam) on 3 posts in a local Brentwood/Franklin group"
            "Send a handwritten note to your most recent closing"
            "Call 2 expired or FSBO listings in your farm area"
          )
          # Slot 6 — Off-site authority ladder (GEO/citation reps). These feed the
          # AI-visibility score. Mostly one-time claims — prune each line as Josh
          # completes it so the bank stays current.
          CITATIONS=(
            "Set your Compass profile Website field to joshuafink.com + paste your new bio"
            "Change your Google Business Profile Website to joshuafink.com (fixes the Bing sync)"
            "Re-sync Bing from Google at bing.com/forbusiness + confirm it shows Published"
            "Claim Joshua Fink Group on Apple Business Connect (businessconnect.apple.com)"
            "Claim/complete your Yelp business page (biz.yelp.com/claim) + add your website"
            "Complete your Zillow agent profile: all service areas + website = joshuafink.com"
            "Claim your Realtor.com agent profile (needs MLS ID) + set the website"
            "Complete your Homes.com agent profile + set website to joshuafink.com"
            "Create your free Nextdoor Business Page (business.nextdoor.com/local)"
          )

          T3="${GBP[$(( DOY % ${#GBP[@]} ))]}"
          T4="${CONTENT[$(( DOY % ${#CONTENT[@]} ))]}"
          T5="${OUTREACH[$(( DOY % ${#OUTREACH[@]} ))]}"
          T6="${CITATIONS[$(( DOY % ${#CITATIONS[@]} ))]}"

          MSG=$(printf '%s\n%s\n%s\n%s\n%s\n%s\n\n%s' \
            "1) Follow up: work new CRM leads + nudge any warm ones" \
            "2) Ask 1 happy client for a Google review (your #1 lever)" \
            "3) $T3" \
            "4) $T4" \
            "5) $T5" \
            "6) Authority ladder: $T6" \
            "Pick the ones you can knock out in 10 min. Consistency > volume.")

          curl -sS --fail -m 20 \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=Daily Growth Tasks (10 min)" \
            --form-string "message=$MSG" \
            --form-string "priority=0" \
            --form-string "sound=bike" \
            https://api.pushover.net/1/messages.json
